<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>偏旁小猎人 - 吴炜坤专属</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Helvetica Neuei", sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: manipulation;
  }
  .screen { display: none; width: 100%; max-width: 500px; padding: 20px; text-align: center; }
  .screen.active { display: block; }

  /* 封面 */
  #cover { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
  .title { font-size: 2.6em; color: #FFD700; margin: 30px 0 10px; text-shadow: 2px 2px 8px rgba(255,215,0,0.3); }
  .subtitle { color: #88c8ff; font-size: 1.1em; margin-bottom: 40px; }
  .char-preview { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
  .char-ball {
    width: 70px; height: 70px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2em; color: white; font-weight: bold;
    animation: float 2s ease-in-out infinite;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .char-ball:nth-child(1){ background: linear-gradient(135deg,#e74c3c,#c0392b); animation-delay: 0s; }
  .char-ball:nth-child(2){ background: linear-gradient(135deg,#2ecc71,#27ae60); animation-delay: 0.3s; }
  .char-ball:nth-child(3){ background: linear-gradient(135deg,#3498db,#2980b9); animation-delay: 0.6s; }
  @keyframes float {
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-10px); }
  }
  .btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #1a1a2e; border: none; border-radius: 50px;
    padding: 16px 50px; font-size: 1.3em; font-weight: bold;
    cursor: pointer; box-shadow: 0 6px 20px rgba(255,165,0,0.4);
    transition: transform 0.1s;
    margin: 10px;
  }
  .btn:active{ transform: scale(0.95); }
  .btn-blue{ background: linear-gradient(135deg,#5dade2,#3498db); color: white; }
  .btn-green{ background: linear-gradient(135deg,#2ecc71,#27ae60); color: white; }

  /* 状态栏 */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,0.1); border-radius: 15px;
    padding: 10px 18px; margin-bottom: 15px; color: white;
  }
  .stars { font-size: 1.4em; }
  .heart { color: #e74c3c; }
  .progress-text { font-size: 0.9em; color: #88c8ff; }
  .progress-bar {
    width: 100%; height: 12px; background: rgba(255,255,255,0.1);
    border-radius: 10px; overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, #2ecc71, #27ae60);
    transition: width 0.4s ease;
  }

  /* 问题区 */
  .question-area {
    background: rgba(255,255,255,0.08); border-radius: 20px;
    padding: 25px 20px; margin-bottom: 20px; color: white;
  }
  .question-label { font-size: 0.95em; color: #88c8ff; margin-bottom: 8px; }
  .question-char { font-size: 4.5em; color: #FFD700; line-height: 1.2; }
  .question-sub { font-size: 0.85em; color: #aaa; margin-top: 6px; }

  /* 答案选项 */
  .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .answer-btn {
    background: rgba(255,255,255,0.12); border: 3px solid transparent;
    border-radius: 16px; padding: 18px 10px; color: white;
    font-size: 1.15em; cursor: pointer; transition: all 0.2s;
    min-height: 80px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .answer-btn:active{ transform: scale(0.95); }
  .answer-btn.wrong{ border-color: #e74c3c; background: rgba(231,76,60,0.2); animation: shake 0.4s; }
  .answer-btn.correct{ border-color: #2ecc71; background: rgba(46,204,113,0.2); }
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    25%{ transform: translateX(-8px); }
    75%{ transform: translateX(8px); }
  }

  .answer-radical { font-size: 1.5em; font-weight: bold; color: #FFD700; }
  .answer-desc { font-size: 0.7em; color: #aaa; margin-top: 2px; }

  /* 星星特效 */
  .star-burst {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
  }
  .confetti {
    position: absolute; font-size: 2em; animation: fall 1s ease-out forwards;
  }
  @keyframes fall {
    0%{ transform: translateY(0) rotate(0deg); opacity: 1; }
    100%{ transform: translateY(300px) rotate(360deg); opacity: 0; }
  }

  /* 结果页 */
  .result-big { font-size: 5em; margin: 20px 0; }
  .result-msg { color: white; font-size: 1.3em; margin: 15px 0; }
  .result-stars { font-size: 2.5em; color: #FFD700; margin: 15px 0; }
  .accuracy { color: #88c8ff; font-size: 1em; margin-bottom: 20px; }
  .encourage { color: #aaa; font-size: 0.95em; margin: 10px 0; }

  /* 底部说明 */
  .bottom-tip {
    color: #555; font-size: 0.8em; margin-top: 15px;
    background: rgba(255,255,255,0.05); border-radius: 10px;
    padding: 10px 15px; text-align: left;
  }
  .bottom-tip div { margin: 3px 0; }
</style>
</head>
<body>

<!-- 封面 -->
<div id="cover" class="screen active">
  <div class="title">🧐 偏旁小猎人</div>
  <div class="subtitle">吴炜坤专属 · 偏旁学习挑战</div>
  <div class="char-preview">
    <div class="char-ball">球</div>
    <div class="char-ball">往</div>
    <div class="char-ball">跑</div>
  </div>
  <div style="color:#88c8ff;font-size:0.95em;line-height:1.8;margin:20px 0;">
    本周学习三个偏旁：<br>
    🔴 王字旁（玉石类）<br>
    🟢 双人旁（行走道路）<br>
    🔵 足字旁（脚步活动）<br>
  </div>
  <button class="btn" onclick="startGame()">开始挑战 ⭐</button>
  <button class="btn btn-blue" onclick="showLearn()">先学习 📖</button>
</div>

<!-- 学习页 -->
<div id="learn" class="screen">
  <div class="title" style="font-size:1.8em;margin-top:10px;">📖 偏旁学习</div>
  <div id="learn-content" style="margin:20px 0;"></div>
  <button class="btn btn-green" onclick="startGame()">去挑战 ⭐</button>
  <button class="btn btn-blue" onclick="showCover()">返回</button>
</div>

<!-- 游戏页 -->
<div id="game" class="screen">
  <div class="status-bar">
    <div class="stars">⭐ <span id="score">0</span></div>
    <div class="progress-text"><span id="done">0</span>/<span id="total">0</span></div>
    <div class="heart">❤️ <span id="lives">3</span></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="question-area">
    <div class="question-label">这个字是什么偏旁？</div>
    <div class="question-char" id="questionChar">球</div>
    <div class="question-sub" id="questionSub">提示：和玉石有关～</div>
  </div>

  <div class="answers" id="answers"></div>

  <div class="bottom-tip" id="tipBox" style="display:none;">
    <div id="tipText"></div>
  </div>
</div>

<!-- 结果页 -->
<div id="result" class="screen">
  <div class="result-big" id="resultEmoji">🎉</div>
  <div class="result-msg" id="resultMsg">太棒了！</div>
  <div class="result-stars" id="resultStars">⭐⭐⭐⭐⭐</div>
  <div class="accuracy" id="resultAccuracy"></div>
  <div class="encourage" id="resultEncourage"></div>
  <button class="btn btn-green" onclick="startGame()">再玩一次 🔄</button>
  <button class="btn" onclick="showCover()">返回首页</button>
</div>

<div class="star-burst" id="starBurst"></div>

<script>
// ==================== 数据 ====================
const radicals = [
  {
    radical: "王字旁", symbol: "𤣩", color: "#e74c3c",
    desc: "大多和玉石有关", emoji: "🔴",
    words: ["球", "珍", "珠", "琳", "琅"]
  },
  {
    radical: "双人旁", symbol: "彳", color: "#2ecc71",
    desc: "大多和行走、道路有关", emoji: "🟢",
    words: ["往", "行", "街", "征", "很"]
  },
  {
    radical: "足字旁", symbol: "⻊", color: "#3498db",
    desc: "大多和脚步活动有关", emoji: "🔵",
    words: ["跑", "跳", "路", "跟", "踩"]
  }
];

// ==================== 状态 ====================
let score = 0;
let lives = 3;
let done = 0;
let total = 0;
let correctCount = 0;
let currentWord = null;
let currentRadical = null;
let gameQuestions = [];
let currentQ = 0;
let answered = false;

// ==================== 工具 ====================
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showCover() { showScreen('cover'); }

// ==================== 学习页 ====================
function showLearn() {
  let html = '';
  radicals.forEach(r => {
    html += `
    <div style="background:rgba(255,255,255,0.08);border-radius:16px;padding:18px;margin:12px 0;text-align:left;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <span style="font-size:1.8em;">${r.emoji}</span>
        <span style="font-size:1.4em;color:#FFD700;font-weight:bold;">${r.radical}</span>
        <span style="font-size:1.1em;color:${r.color};">（${r.symbol}）</span>
      </div>
      <div style="color:#88c8ff;font-size:0.9em;margin:4px 0;">${r.desc}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
        ${r.words.map(w => `<span style="background:${r.color}22;border:2px solid ${r.color};border-radius:10px;padding:4px 12px;color:white;font-size:1.1em;">${w}</span>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('learn-content').innerHTML = html;
  showScreen('learn');
}

// ==================== 游戏逻辑 ====================
function generateQuestions() {
  let qs = [];
  // 每个偏旁随机选2~3个字
  radicals.forEach(r => {
    let words = shuffle(r.words).slice(0, 3);
    words.forEach(word => {
      // 生成干扰选项（其他偏旁的随机字）
      let distractors = shuffle(
        radicals.filter(rr => rr.radical !== r.radical)
          .flatMap(rr => rr.words)
      ).slice(0, 3);
      let options = shuffle([r.radical, ...distractors]);
      qs.push({ word, correct: r.radical, options, hint: r.desc, color: r.color, emoji: r.emoji });
    });
  });
  return shuffle(qs);
}

function startGame() {
  score = 0; lives = 3; done = 0; correctCount = 0; currentQ = 0;
  gameQuestions = generateQuestions();
  total = gameQuestions.length;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('total').textContent = total;
  document.getElementById('done').textContent = done;
  document.getElementById('progressFill').style.width = '0%';
  showScreen('game');
  showQuestion();
}

function showQuestion() {
  if (currentQ >= gameQuestions.length) {
    showResult(); return;
  }
  answered = false;
  let q = gameQuestions[currentQ];
  currentWord = q.word;
  currentRadical = q.correct;

  document.getElementById('questionChar').textContent = q.word;
  document.getElementById('questionSub').textContent = `提示：${q.hint}～`;
  document.getElementById('tipBox').style.display = 'none';

  let html = '';
  q.options.forEach(opt => {
    let r = radicals.find(rr => rr.radical === opt);
    html += `
    <button class="answer-btn" onclick="checkAnswer('${opt}', this)" data-opt="${opt}">
      <span class="answer-radical">${opt}</span>
      <span class="answer-desc">${r ? r.symbol : ''}</span>
    </button>`;
  });
  document.getElementById('answers').innerHTML = html;
}

function checkAnswer(opt, btn) {
  if (answered) return;
  answered = true;
  let q = gameQuestions[currentQ];
  let r = radicals.find(rr => rr.radical === opt);
  btn.classList.add(opt === q.correct ? 'correct' : 'wrong');
  document.querySelectorAll('.answer-btn').forEach(b => {
    if (b.dataset.opt === q.correct) b.classList.add('correct');
    b.style.pointerEvents = 'none';
  });

  if (opt === q.correct) {
    score += 10;
    correctCount++;
    burstStars(btn);
    document.getElementById('score').textContent = score;
  } else {
    lives--;
    document.getElementById('lives').textContent = lives;
    if (lives <= 0) {
      setTimeout(showResult, 800); return;
    }
  }

  done++;
  document.getElementById('done').textContent = done;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';

  setTimeout(() => {
    currentQ++;
    showQuestion();
  }, 900);
}

function burstStars(btn) {
  let rect = btn.getBoundingClientRect();
  let cx = rect.left + rect.width / 2;
  let cy = rect.top;
  let burst = document.getElementById('starBurst');
  for (let i = 0; i < 8; i++) {
    let star = document.createElement('div');
    star.className = 'confetti';
    star.textContent = ['⭐','✨','🌟','💫'][Math.floor(Math.random()*4)];
    star.style.left = (cx + (Math.random() - 0.5) * 80) + 'px';
    star.style.top = cy + 'px';
    burst.appendChild(star);
    setTimeout(() => star.remove(), 1200);
  }
}

function showResult() {
  let pct = Math.round(correctCount / total * 100);
  let emoji = pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪';
  let msg = pct === 100 ? '完美通关！偏旁小达人了！' :
            pct >= 70 ? '很棒！再来一次可以更好！' :
            pct >= 50 ? '不错哦！继续加油！' :
            '没关系的，多玩几次就熟悉了！';
  let stars = '⭐'.repeat(Math.min(5, Math.ceil(pct / 20)));
  let encourage = pct >= 70 ? '炜坤真棒！' : '学习就是慢慢来的，加油！';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultStars').textContent = stars;
  document.getElementById('resultAccuracy').textContent = `正确率：${correctCount}/${total}（${pct}%）`;
  document.getElementById('resultEncourage').textContent = encourage;
  showScreen('result');
}
</script>
</body>
</html>
